<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — TekVotes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .back-to-site {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
        }
        .back-to-site a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .back-to-site a:hover {
            background: rgba(255,255,255,0.3);
            transform: translateX(-5px);
        }
        .login-container {
            background: white;
            border-radius: 1.5rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            margin: 1rem;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo span { font-size: 3rem; }
        .logo h1 { font-size: 2rem; margin-top: 0.5rem; color: #111; }
        .logo .gold { color: #D4AF37; }
        .logo p { color: #6b7280; margin-top: 0.5rem; }
        .form-group { margin-bottom: 1.5rem; }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #374151;
        }
        .input-wrapper { position: relative; }
        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }
        input {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.5rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }
        button {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, #D4AF37, #E8C860);
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            color: #111;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            text-align: center;
            display: none;
        }
        .demo-note {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #e5e7eb;
            font-size: 0.875rem;
            color: #6b7280;
        }
        .demo-note code {
            background: #f3f4f6;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-family: monospace;
        }
        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer-links { text-align: center; margin-top: 1rem; }
        .footer-links a { color: #6b7280; text-decoration: none; font-size: 0.875rem; }
        .footer-links a:hover { color: #D4AF37; }
    </style>
</head>
<body>
    <div class="back-to-site">
        <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Website</a>
    </div>
    <div class="login-container">
        <div class="logo">
            <span></span>
            <h1>Tek<span class="gold">Votes</span></h1>
            <p>Admin Control Panel</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="Enter username" required autocomplete="off">
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
            </div>
            <button type="submit" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Sign In
                <div class="loader"></div>
            </button>
            <div id="errorMsg" class="error-message"></div>
        </form>
        
        <div class="footer-links">
            <a href="index.html"><i class="fas fa-home"></i> Return to Homepage</a>
        </div>
    </div>
    <script>
        const API_URL = window.location.origin + '/api';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            const loader = loginBtn.querySelector('.loader');
            const btnText = loginBtn.querySelector('i');
            
            if (!username || !password) {
                errorMsg.textContent = 'Please enter username and password';
                errorMsg.style.display = 'block';
                return;
            }
            
            btnText.style.display = 'none';
            loader.style.display = 'inline-block';
            loginBtn.disabled = true;
            errorMsg.style.display = 'none';
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    localStorage.setItem('adminToken', result.token);
                    localStorage.setItem('adminName', result.admin.username);
                    localStorage.setItem('adminRole', result.admin.role);
                    localStorage.setItem('adminId', result.admin.id);
                    
                    loginBtn.style.background = '#10b981';
                    loginBtn.innerHTML = '<i class="fas fa-check"></i> Login Successful! Redirecting...';
                    
                    setTimeout(() => {
                        window.location.href = 'admin-dashboard.html';
                    }, 1000);
                } else {
                    errorMsg.textContent = result.message || 'Invalid credentials. Try admin/admin123';
                    errorMsg.style.display = 'block';
                    btnText.style.display = 'inline-block';
                    loader.style.display = 'none';
                    loginBtn.disabled = false;
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMsg.textContent = 'Connection error. Make sure the server is running on port 3000.';
                errorMsg.style.display = 'block';
                btnText.style.display = 'inline-block';
                loader.style.display = 'none';
                loginBtn.disabled = false;
            }
        });
        
        // Check if already logged in
        const token = localStorage.getItem('adminToken');
        if (token) {
            fetch(`${API_URL}/auth/verify`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    localStorage.clear();
                }
            })
            .catch(() => localStorage.clear());
        }
    </script>
</body>
</html>
